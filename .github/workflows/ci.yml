name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [nginx, wordpress, mariadb]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint ${{ matrix.service }}/Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: srcs/requirements/${{ matrix.service }}/Dockerfile
          # WIP repo: some Dockerfiles are still empty. Warn instead of hard-fail
          # until every service has real content, then flip this to false.
          no-fail: true

  lint-compose:
    name: Lint docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (for yamllint)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint docker-compose.yml
        run: yamllint -d relaxed srcs/docker-compose.yml

  test:
    name: Build (${{ matrix.os }})
    needs: [lint, lint-compose]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Two different runner images give two different Docker Engine /
        # Compose CLI versions — the closest real analogue to a "version
        # matrix" for a Docker-only infrastructure repo.
        os: [ubuntu-22.04, ubuntu-24.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('srcs/requirements/**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create placeholder .env for compose
        run: |
          # docker-compose.yml expects srcs/.env (gitignored). Create a
          # throwaway one so `compose config` / `build` can run in CI.
          touch srcs/.env

      - name: Validate docker-compose.yml
        run: docker compose -f srcs/docker-compose.yml config

      - name: Build all images
        uses: docker/bake-action@v5
        with:
          workdir: srcs
          files: docker-compose.yml
          set: |
            *.cache-from=type=local,src=/tmp/.buildx-cache
            *.cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
